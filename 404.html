<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var locationData =
          window.location.pathname.slice(1) +
          window.location.search +
          window.location.hash;
        var redirectTarget =
          "/?/" +
          locationData
            .replace(/&/g, "~and~")
            .replace(/^\//, "");

        window.location.replace(redirectTarget);
      })();
    </script>
  </head>
  <body></body>
</html>
